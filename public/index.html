<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgetic — eBay Business Intelligence Dashboard</title>
  <meta name="description" content="Forgetic: Real-time eBay market intelligence, pricing analytics, competitor insights, and AI-powered business recommendations for eBay sellers.">

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="stylesheet" href="/css/dashboard.css">

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="view-container"></div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ============================================================
       TEMPLATE: LOGIN
       ============================================================ -->
  <template id="tpl-login">
    <div class="auth-root">
      <!-- Left branding -->
      <div class="auth-brand">
        <div class="auth-blob auth-blob-1"></div>
        <div class="auth-blob auth-blob-2"></div>
        <div class="auth-blob auth-blob-3"></div>
        <div class="auth-brand-content">
          <div class="auth-logo">
            <div class="auth-logo-icon">
              <img src="/img/forgetic-logo.png" alt="Forgetic Logo" style="width:100%;height:100%;object-fit:contain">
            </div>
            <span class="auth-logo-text">Forgetic</span>
          </div>
          <h1>Your eBay Business<br><span>Intelligence Hub</span></h1>
          <p>Real-time market data, AI-powered insights, and deep analytics to grow your eBay store.</p>
          <div class="auth-features">
            <div class="auth-feature">
              <div class="auth-feature-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
              <span>Live eBay scraping by URL or keyword</span>
            </div>
            <div class="auth-feature">
              <div class="auth-feature-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
              <span>10+ analytics modules with real-time data</span>
            </div>
            <div class="auth-feature">
              <div class="auth-feature-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
              <span>AI-powered strategies &amp; price recommendations</span>
            </div>
            <div class="auth-feature">
              <div class="auth-feature-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div>
              <span>Profit estimator with full fee breakdown</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Right form panel -->
      <div class="auth-panel">
        <div class="auth-form-wrap">
          <div class="auth-header">
            <h2>Welcome back</h2>
            <p>Sign in to access your dashboard</p>
          </div>

          <form id="login-form" class="auth-form" novalidate>
            <div class="form-group">
              <label for="login-email">Email Address</label>
              <input type="email" id="login-email" placeholder="name@company.com" autocomplete="email" required>
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <div class="input-password-wrap">
                <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password">
                <button type="button" class="toggle-password" data-target="login-password">
                  <svg id="eye-login" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>

            <div class="divider-text">OR login with OTP</div>

            <div class="form-group">
              <label for="login-email-otp">Email for OTP</label>
              <div class="otp-row">
                <input type="email" id="login-email-otp" placeholder="your@email.com">
                <button type="button" class="btn btn-secondary btn-sm" id="btn-send-otp">Send OTP</button>
              </div>
            </div>
            <div class="form-group" id="otp-input-group" style="display:none">
              <label>Enter OTP Code</label>
              <div class="otp-boxes" id="otp-boxes">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
              </div>
            </div>

            <div class="auth-actions">
              <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.8rem;color:var(--text-muted);cursor:pointer;text-transform:none;letter-spacing:0;">
                <input type="checkbox" id="remember-me" style="width:auto"> Remember me
              </label>
              <a href="#/forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="auth-submit" id="btn-login">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
              Sign In
            </button>
          </form>

          <div class="auth-footer">
            Don't have an account? <a href="#/register">Create one free</a>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ============================================================
       TEMPLATE: REGISTER
       ============================================================ -->
  <template id="tpl-register">
    <div class="auth-root">
      <div class="auth-brand">
        <div class="auth-blob auth-blob-1"></div>
        <div class="auth-blob auth-blob-2"></div>
        <div class="auth-blob auth-blob-3"></div>
        <div class="auth-brand-content">
          <div class="auth-logo">
            <div class="auth-logo-icon">
              <img src="/img/forgetic-logo.png" alt="Forgetic Logo" style="width:100%;height:100%;object-fit:contain">
            </div>
            <span class="auth-logo-text">Forgetic</span>
          </div>
          <h1>Start Selling<br><span>Smarter Today</span></h1>
          <p>Join sellers using Forgetic to outperform the competition with data-driven decisions.</p>
          <div class="auth-features">
            <div class="auth-feature">
              <div class="auth-feature-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
              <span>Personal dashboard for your store</span>
            </div>
            <div class="auth-feature">
              <div class="auth-feature-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
              <span>Secure and private data</span>
            </div>
          </div>
        </div>
      </div>
      <div class="auth-panel">
        <div class="auth-form-wrap">
          <div class="auth-header">
            <h2>Create Account</h2>
            <p>Start your free Forgetic account</p>
          </div>
          <form id="register-form" class="auth-form" novalidate>
            <div class="form-group">
              <label for="reg-name">Full Name</label>
              <input type="text" id="reg-name" placeholder="Your full name" required>
            </div>
            <div class="form-group">
              <label for="reg-email">Email Address</label>
              <input type="email" id="reg-email" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
              <label for="reg-phone">Phone Number</label>
              <input type="tel" id="reg-phone" placeholder="+62 812 3456 7890">
            </div>
            <div class="form-group">
              <label for="reg-password">Password</label>
              <div class="input-password-wrap">
                <input type="password" id="reg-password" placeholder="Min. 8 characters" required>
                <button type="button" class="toggle-password" data-target="reg-password">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            <div class="form-group">
              <label for="reg-confirm">Confirm Password</label>
              <div class="input-password-wrap">
                <input type="password" id="reg-confirm" placeholder="Repeat your password" required>
                <button type="button" class="toggle-password" data-target="reg-confirm">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            <button type="submit" class="auth-submit" id="btn-register">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
              Create Account
            </button>
          </form>
          <div class="auth-footer">
            Already have an account? <a href="#/login">Sign in</a>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ============================================================
       TEMPLATE: FORGOT PASSWORD
       ============================================================ -->
  <template id="tpl-forgot">
    <div class="auth-root">
      <div class="auth-brand">
        <div class="auth-blob auth-blob-1"></div>
        <div class="auth-blob auth-blob-2"></div>
        <div class="auth-brand-content">
          <div class="auth-logo">
            <div class="auth-logo-icon">
              <img src="/img/forgetic-logo.png" alt="Forgetic Logo" style="width:100%;height:100%;object-fit:contain">
            </div>
            <span class="auth-logo-text">Forgetic</span>
          </div>
          <h1>Account<br><span>Recovery</span></h1>
          <p>We'll send a verification code to your email to reset your password.</p>
        </div>
      </div>
      <div class="auth-panel">
        <div class="auth-form-wrap">
          <button class="auth-back" id="forgot-back">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back to Sign In
          </button>

          <div class="auth-steps">
            <div class="auth-step active" id="step-1-dot"></div>
            <div class="auth-step" id="step-2-dot"></div>
            <div class="auth-step" id="step-3-dot"></div>
          </div>

          <!-- Step 1: Email -->
          <div id="forgot-step-1">
            <div class="auth-header">
              <h2>Reset Password</h2>
              <p>Enter your email to receive a verification code</p>
            </div>
            <form class="auth-form" id="forgot-email-form">
              <div class="form-group">
                <label for="forgot-email">Email Address</label>
                <input type="email" id="forgot-email" placeholder="name@company.com" required>
              </div>
              <button type="submit" class="auth-submit">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                Send Reset Code
              </button>
            </form>
          </div>

          <!-- Step 2: OTP -->
          <div id="forgot-step-2" style="display:none">
            <div class="auth-header">
              <h2>Enter OTP Code</h2>
              <p>We sent a 6-digit code to your email</p>
            </div>
            <form class="auth-form" id="forgot-otp-form">
              <div class="form-group" style="text-align:center">
                <div class="otp-boxes" id="forgot-otp-boxes">
                  <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
                  <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
                  <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
                  <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
                  <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
                  <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
                </div>
              </div>
              <button type="submit" class="auth-submit">Verify Code</button>
            </form>
          </div>

          <!-- Step 3: New Password -->
          <div id="forgot-step-3" style="display:none">
            <div class="auth-header">
              <h2>New Password</h2>
              <p>Choose a strong new password</p>
            </div>
            <form class="auth-form" id="forgot-reset-form">
              <div class="form-group">
                <label for="new-password">New Password</label>
                <div class="input-password-wrap">
                  <input type="password" id="new-password" placeholder="Min. 8 characters" required>
                  <button type="button" class="toggle-password" data-target="new-password">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
              </div>
              <div class="form-group">
                <label for="confirm-new-password">Confirm New Password</label>
                <div class="input-password-wrap">
                  <input type="password" id="confirm-new-password" placeholder="Repeat new password" required>
                  <button type="button" class="toggle-password" data-target="confirm-new-password">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
              </div>
              <button type="submit" class="auth-submit">Reset Password</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ============================================================
       TEMPLATE: DASHBOARD SHELL
       ============================================================ -->
  <template id="tpl-dashboard">
    <div class="dashboard-layout">

      <!-- ── Sidebar ── -->
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-logo">
            <img src="/img/forgetic-logo.png" alt="Forgetic Logo" style="width:100%;height:100%;object-fit:contain">
          </div>
          <div class="brand-text">
            <span class="brand-name">Forgetic</span>
            <span class="brand-tag">eBay Intelligence</span>
          </div>
        </div>

        <nav class="sidebar-nav">
          <span class="nav-section-label">Analytics</span>
          <a href="#/dashboard/overview" class="nav-item" data-page="overview" id="nav-overview">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Overview
          </a>
          <a href="#/dashboard/research" class="nav-item" data-page="research" id="nav-research">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Product Research
          </a>
          <a href="#/dashboard/demand" class="nav-item" data-page="demand" id="nav-demand">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Demand
          </a>
          <a href="#/dashboard/pricing" class="nav-item" data-page="pricing" id="nav-pricing">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Pricing Intel
          </a>

          <span class="nav-section-label" style="margin-top:0.5rem">Insights</span>
          <a href="#/dashboard/customer" class="nav-item" data-page="customer" id="nav-customer">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Customer Insight
          </a>
          <a href="#/dashboard/segmentation" class="nav-item" data-page="segmentation" id="nav-segmentation">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            Market Segmentation
          </a>
          <a href="#/dashboard/competitive" class="nav-item" data-page="competitive" id="nav-competitive">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg>
            Competitive Intel
          </a>
          <a href="#/dashboard/behavior" class="nav-item" data-page="behavior" id="nav-behavior">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Buyer Behavior
          </a>

          <span class="nav-section-label" style="margin-top:0.5rem">Tools</span>
          <a href="#/dashboard/estimator" class="nav-item" data-page="estimator" id="nav-estimator">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>
            Profit Estimator
          </a>
          <a href="#/dashboard/optimizer" class="nav-item" data-page="optimizer" id="nav-optimizer">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20v-6M6 20V10M18 20V4"/></svg>
            Post-Listing Optimizer
          </a>
          <a href="#/dashboard/recent" class="nav-item" data-page="recent" id="nav-recent">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Recent
            <span class="nav-badge" id="recent-count">0</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <a href="#/dashboard/settings" class="nav-item" data-page="settings" id="nav-settings">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Settings
          </a>
          <button id="btn-logout" class="nav-item btn-link" style="width:100%;text-align:left;color:var(--text-muted)">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign Out
          </button>
        </div>
      </aside>

      <!-- ── Main Content ── -->
      <main class="main-content">
        <!-- Topbar -->
        <header class="topbar">
          <div class="search-wrap">
